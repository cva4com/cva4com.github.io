# Configuration
baseURL: https://cva4.com/
languageCode: en-us
title: CVA4
theme: hextra

enableRobotsTXT: true
# Parse Git commit
enableGitInfo: false
# enableEmoji: false
hasCJKLanguage: true

services:
  googleAnalytics:
    ID: G-0SM6SYKD3T

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
    title: CVA4
  vi:
    languageName: Tiếng Việt
    languageCode: vi
    weight: 2
    title: CVA4

module:
  hugoVersion:
    extended: true
    min: "0.112.0"

  # workspace: hugo.work
  # imports:
  #   - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - identifier: all
      name: CV Templates
      url: "/all/"
      weight: 1
    # - identifier: docs
    #   name: Documentation
    #   pageRef: /docs
    #   weight: 2
    - identifier: tutorials
      name: Tutorials
      pageRef: /tuts
      weight: 2
    - identifier: showcase
      name: Showcase
      pageRef: /showcase
      weight: 3
    - identifier: download
      name: Download
      pageRef: /download
      weight: 4
    - identifier: blog
      name: Blog
      pageRef: /blog
      # url: "https://blog.cva4.com"
      weight: 5
    - identifier: story
      name: Story
      pageRef: /story
      weight: 6
    - identifier: sponsor
      name: Sponsor
      pageRef: /sponsor
      weight: 7
    - identifier: about
      name: About
      pageRef: /about
      weight: 8
    - name: Search
      weight: 9
      params:
        type: search

  sidebar:
    - identifier: more
      name: More
      params:
        type: separator
      weight: 1
    - identifier: about
      name: "About"
      pageRef: "/about"
      weight: 2
    - identifier: getstarted
      name: "Get Started ↗"
      url: "http://app.cva4.com"
      weight: 3

params:
  description: CV in A4 page, Computer Vision and more

  externalLinkDecoration: true

  navbar:
    displayTitle: true
    displayLogo: false
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      # width: 40
      # height: 20
      # link: /
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: normal

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Display the author name of the last modified date
  displayUpdatedAuthor: false

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: false
    base: "https://github.com/cva4com/cva4com.github.io/edit/main/content"

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  archives:
    # Source section used for the archives page.
    section: blog
    # Date format for archive list items.
    dateFormat: "Jan 02"

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    # tabs:
    #   sync: true
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."
        - name: Open in Claude
          icon: claude
          url: "https://claude.ai/new?q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

  imageZoom:
    enable: true

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: imfing/hextra
      repoId: R_kgDOJ9fJag
      category: General
      categoryId: DIC_kwDOJ9fJas4CY7gW
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      # lang: en
      # theme: noborder_dark
